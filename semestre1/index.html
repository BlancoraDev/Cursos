<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primer Semestre</title>
<style>
:root{
    --bg:#090b18;
    --panel:#10172f;
    --text:#e7f2ff;
    --muted:#94a5c4;
    --accent:#3fd7ff;
    --accent2:#ff4ea8;
    --shadow:#041225;
}
*{box-sizing:border-box}
.bg-video-s{ position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:-2; opacity:.88; }
.bg-overlay-s{ position:fixed; inset:0; background:linear-gradient(180deg, rgba(9,11,24,.65) 0%, rgba(5,8,18,.75) 70%, rgba(5,8,18,.85) 100%); z-index:-1; pointer-events:none; }
body{
    margin:0;
    min-height:100vh;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #070b17;
    color:var(--text);
    display:grid;
    place-items:center;
    padding:24px;
}
.container{
    width:min(100%, 980px);
    text-align:center;
}
.header-card{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding:24px 32px;
    border-radius:26px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 20px 50px rgba(0,0,0,.35), inset 0 1px 1px rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    margin-bottom:32px;
    transform-style:preserve-3d;
}
h1{
    margin:0;
    font-size:clamp(2.4rem,4vw,3.6rem);
    letter-spacing:.08em;
    text-transform:uppercase;
    position:relative;
}
h1 span{
    display:block;
    font-size:1rem;
    color:var(--accent);
    letter-spacing:.18em;
    margin-top:-4px;
    font-weight:600;
}
p.description{
    margin:12px auto 0;
    max-width:680px;
    color:var(--muted);
    font-size:1rem;
    line-height:1.7;
}
.back-link{
    display:inline-flex;
    align-items:center;
    gap:10px;
    justify-content:center;
    padding:16px 26px;
    border-radius:999px;
    background:rgba(63,215,255,.14);
    color:var(--text);
    text-decoration:none;
    font-weight:700;
    border:1px solid rgba(63,215,255,.24);
    box-shadow:0 18px 40px rgba(0,0,0,.2);
    transition:transform .3s ease, box-shadow .3s ease, background .3s ease;
    margin-top:24px;
}
.back-link:hover{
    transform:translateY(-4px);
    background:rgba(63,215,255,.22);
    box-shadow:0 26px 48px rgba(0,0,0,.3);
}
@media (max-width:640px){
    body{padding:16px;}
    .header-card{padding:22px 18px;}
}
</style>
</head>
<body>
<video class="bg-video-s" autoplay muted loop playsinline>
  <source src="../subfondo.mp4" type="video/mp4">
</video>
<div class="bg-overlay-s"></div>
<div class="container">
    <div class="header-card">
        <h1>Primer Semestre<span>UNAP · Ingeniería Estadística e Informática</span></h1>
        <p class="description">Contenido del Primer Semestre</p>
    </div>
    <a class="back-link" href="../">⬅ Volver al Portal Académico</a>
</div>
</body>
</html>
